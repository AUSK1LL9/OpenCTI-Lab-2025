version: '3'

services:
  # Generate RSA key for xtm-composer (PKCS#8 format)
  rsa-key-generator:
    image: alpine/openssl:latest
    volumes:
      - rsakeys:/keys
    entrypoint: ["/bin/ash"]
    command: ["-c", "if [ ! -f /keys/private_key.pem ]; then openssl genpkey -algorithm RSA -out /keys/private_key.pem -pkeyopt rsa_keygen_bits:4096; fi && tail -f /dev/null"]
    healthcheck:
      test: ["CMD", "test", "-f", "/keys/private_key.pem"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  redis:
    image: redis:8.6.1
    restart: always
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.12
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.ml.enabled=false
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
      - thread_pool.search.queue_size=5000
      - logger.org.elasticsearch.discovery="ERROR"
      - "ES_JAVA_OPTS=-Xms${ELASTIC_MEMORY_SIZE} -Xmx${ELASTIC_MEMORY_SIZE}"
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    restart: always
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://elasticsearch:9200/_cluster/health?wait_for_status=yellow >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30

  minio:
    image: minio/minio:latest
    volumes:
      - s3data:/data
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    command: server /data
    restart: always
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3

  rabbitmq:
    image: rabbitmq:4.2-management
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
      - RABBITMQ_NODENAME=rabbit01@rabbitmq
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    volumes:
      - type: bind
        source: ./rabbitmq.conf
        target: /etc/rabbitmq/rabbitmq.conf
      - amqpdata:/var/lib/rabbitmq
    restart: always
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3

  xtm-composer:
    image: filigran/xtm-composer:latest
    platform: linux/amd64
    environment:
      - MANAGER__ID=${XTM_COMPOSER_ID}
      - "MANAGER__NAME=XTM Integrations Manager"
      - MANAGER__CREDENTIALS_KEY_FILEPATH=/keys/private_key.pem
      - OPENCTI__ENABLE=true
      - OPENCTI__URL=${OPENCTI_URL}
      - OPENCTI__TOKEN=${OPENCTI_ADMIN_TOKEN}
      - OPENCTI__DAEMON__SELECTOR=docker
      - OPENCTI__DAEMON__DOCKER__NETWORK_MODE=${COMPOSE_PROJECT_NAME}_default
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - rsakeys:/keys:ro
    depends_on:
      rsa-key-generator:
        condition: service_healthy
      opencti:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: always

  opencti:
    image: opencti/platform:latest
    environment:
      - NODE_OPTIONS=--max-old-space-size=8096
      - APP__PORT=8080
      - APP__BASE_URL=${OPENCTI_BASE_URL}
      - APP__HTTPS_CERT__KEY=${OPENCTI_KEY_PATH}
      - APP__HTTPS_CERT__CRT=${OPENCTI_CRT_PATH}
      - APP__ADMIN__EMAIL=${OPENCTI_ADMIN_EMAIL}
      - APP__ADMIN__PASSWORD=${OPENCTI_ADMIN_PASSWORD}
      - APP__ADMIN__TOKEN=${OPENCTI_ADMIN_TOKEN}
      - APP__ENCRYPTION_KEY=${OPENCTI_ENCRYPTION_KEY}
      - APP__APP_LOGS__LOGS_LEVEL=info
      - REDIS__HOSTNAME=redis
      - REDIS__PORT=6379
      - ELASTICSEARCH__URL=http://elasticsearch:9200
      - ELASTICSEARCH__NUMBER_OF_REPLICAS=0
      - MINIO__ENDPOINT=minio
      - MINIO__PORT=9000
      - MINIO__USE_SSL=false
      - MINIO__ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO__SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - RABBITMQ__HOSTNAME=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__PORT_MANAGEMENT=15672
      - RABBITMQ__MANAGEMENT_SSL=false
      - RABBITMQ__USERNAME=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ__PASSWORD=${RABBITMQ_DEFAULT_PASS}
      - SMTP__HOSTNAME=${SMTP_HOSTNAME}
      - SMTP__PORT=${SMTP_PORT}
      - SMTP__USE_SSL=${SMTP_USE_SSL}
      - SMTP__REJECT_UNAUTHORIZED=${SMTP_REJECT_UNAUTHORIZED}
      - SMTP__USERNAME=${SMTP_USERNAME}
      - SMTP__PASSWORD=${SMTP_PASSWORD}
      - SMTP__FROM_EMAIL=lab@home-qitcs.com.au
      - APP__ADMIN__EMAIL=lab@home-qitcs.com.au
      - PROVIDERS__LOCAL__STRATEGY=LocalStrategy
      - APP__HEALTH_ACCESS_KEY=${OPENCTI_HEALTHCHECK_ACCESS_KEY}
      - AI__ENABLED=true
      - AI__TYPE=mistralai
      - AI__ENDPOINT=${AI_OLLAMA_SERVER}
      #- AI__MODEL=mistral-nemo:latest
      - AI__MODEL=llama3.1:8b
      - AI__TOKEN=none
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    ports:
      - "8080:8080"
    volumes:
      - /etc/ssl/localcerts/:/etc/ssl/localcerts:ro
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://dockeransible.qitcs.com.au:8080/health?health_access_key=${OPENCTI_HEALTHCHECK_ACCESS_KEY}"]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    image: opencti/worker:latest
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - WORKER_LOG_LEVEL=info
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    depends_on:
      opencti:
        condition: service_healthy
    deploy:
      mode: replicated
      replicas: 5
    restart: always

  # --- Connectors Section ---

  connector-wazuh:
    image: ghcr.io/misje/opencti-wazuh-connector:0.3.0
    restart: always
    environment:
      - TZ=UTC
      - USE_TZ=true
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=a3d375e4-1696-4e6d-acf3-1eeed68ba61e
      - CONNECTOR_NAME=Wazuh
      - CONNECTOR_SCOPE=Artifact,Directory,Domain-Name,Email-Addr,Hostname,IPv4-Addr,IPv6-Addr,Mac-Addr,Network-Traffic,Process,StixFile,Url,User-Account,User-Agent,Windows-Registry-Key,Windows-Registry-Value-Type,Vulnerability,Indicator
      - CONNECTOR_AUTO=true
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_EXPOSE_METRICS=true
      - WAZUH_APP_URL=https://wazuh.qitcs.com.au
      - WAZUH_OPENSEARCH_PASSWORD=${WAZUH_OPENSEARCH_PASSWORD} # Defined in your .env
      - WAZUH_OPENSEARCH_URL=https://wazuh.qitcs.com.au:9200
      - WAZUH_OPENSEARCH_USERNAME=cti_connector
      - WAZUH_OPENSEARCH_VERIFY_TLS=false
      - WAZUH_MAX_TLP=TLP:AMBER+STRICT
      - WAZUH_CREATE_SIGHTINGS=true
      - WAZUH_IMPORT_ALERTS=true
      #- WAZUH_SSL_VERIFY=/usr/local/share/ca-certificates/wazuh-ca.crt
      - WAZUH_SSL_VERIFY=false
    volumes:
      - wazuh_cache:/var/cache/wazuh
      - ./certs/wazuh-root-ca.pem:/usr/local/share/ca-certificates/wazuh-ca.crt
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    logging:
      options:
        max-size: 50m
    depends_on:
      opencti:
        condition: service_healthy

  connector-cve:
    image: opencti/connector-cve:latest
    restart: always
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=16c36eba-8143-4129-abd7-2b17b0a421d8
      - CONNECTOR_NAME=Common Vulnerabilities and Exposures
      - CVE_BASE_URL=https://services.nvd.nist.gov/rest/json/cves
      - CVE_API_KEY=79f53f72-3a73-45ce-b722-72f356eb0bea
      - CONNECTOR_DURATION_PERIOD=PT2H
      - CVE_PULL_HISTORY=true
      - CVE_HISTORY_START_YEAR=2020
      - CVE_MAX_DATE_RANGE=120
      - CONNECTOR_LOG_LEVEL=info
      - CVE_INTERVAL=3
      # FORCING V4 AND BYPASSING TLS CHECKS FOR THE LOCAL BRIDGE
      - GAI_CONF=force_ipv4
      - OPENCTI_SSL_VERIFY=false
      - PYTHONHTTPSVERIFY=0
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
    # FORCE THE CONTAINER TO USE PUBLIC DNS TO RULE OUT LOCAL RESOLUTION ISSUES
    dns:
      - 192.168.88.137
      - 192.168.88.1
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
  
  connector-criminalip:
    image: opencti/connector-criminalip-c2-daily-feed:latest
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=804868a8-3642-4f3b-967b-607876a382c9
      - CONNECTOR_NAME=Criminal IP C2 Daily Feed
      - CONNECTOR_SCOPE=criminalip
      - CONNECTOR_LOG_LEVEL=info
      - CRIMINALIP_CSV_URL=https://raw.githubusercontent.com/criminalip/C2-Daily-Feed/refs/heads/main
      - CRIMINALIP_CONFIDENCE_SCORE=75
      - CONNECTOR_DURATION_PERIOD=P1D
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    restart: always
    depends_on:
      opencti:
        condition: service_healthy

  connector-malpedia:
    image: opencti/connector-malpedia:latest
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=3e270219-4afb-4e54-9ebc-05b8ede163f7
      - CONNECTOR_NAME=Malpedia
      - CONNECTOR_SCOPE=malpedia
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_EXPOSE_METRICS=false
      #- MALPEDIA_AUTH_KEY=${MALPEDIA_AUTH_KEY} - Key Not Publically Available - Only Invite Only: https://malpedia.caad.fkie.fraunhofer.de/login
      - CONNECTOR_DURATION_PERIOD=PT24H
      - MALPEDIA_IMPORT_INTRUSION_SETS=true
      - MALPEDIA_IMPORT_YARA=true
      - MALPEDIA_CREATE_INDICATORS=true
      - MALPEDIA_CREATE_OBSERVABLES=true
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    restart: always
    depends_on:
      opencti:
        condition: service_healthy

  connector-shodan:
    image: opencti/connector-shodan:latest
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=8c306631-0e12-4f3e-8367-93821034c56e
      - CONNECTOR_NAME=Shodan
      - CONNECTOR_SCOPE=IPv4-Addr,Indicator
      - CONNECTOR_AUTO=false
      - CONNECTOR_LOG_LEVEL=info
      - SHODAN_TOKEN=${SHODAN_API}
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    restart: always
    depends_on:
      opencti:
        condition: service_healthy

  connector-cpe:
    image: opencti/connector-cpe:latest
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=cdf28366-2233-48e6-b6a9-6e2992e9b40e
      - CONNECTOR_TYPE=EXTERNAL_IMPORT
      - CONNECTOR_NAME=Common Platform Enumeration
      - CONNECTOR_SCOPE=software
      - CONNECTOR_LOG_LEVEL=info
      - NIST_API_KEY=${NIST_API_KEY}
      - CONNECTOR_DURATION_PERIOD=PT6H
      - CPE_RESULTS_PER_PAGE=1000
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    restart: always
    depends_on:
      opencti:
        condition: service_healthy

  connector-import-external-reference:
    image: opencti/connector-import-external-reference:latest
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_IMPORT_EXTERNAL_REFERENCE_ID}
      - CONNECTOR_NAME=ImportExternalReference
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    restart: always
    depends_on:
      opencti:
        condition: service_healthy

  connector-analysis:
    image: opencti/connector-import-document:latest
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_ANALYSIS_ID}
      - CONNECTOR_TYPE=INTERNAL_ANALYSIS
      - CONNECTOR_NAME=ImportDocumentAnalysis
      - CONNECTOR_VALIDATE_BEFORE_IMPORT=false
      - CONNECTOR_SCOPE=application/pdf,text/plain,text/html
      - CONNECTOR_AUTO=true
      - CONNECTOR_ONLY_CONTEXTUAL=false
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    restart: always
    depends_on:
      opencti:
        condition: service_healthy

  connector-urlhaus:
    image: opencti/connector-urlhaus:latest
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=a1bd7d16-2b5e-41e9-bb6d-80f5fe95830e
      - CONNECTOR_NAME=Abuse.ch URLhaus
      - CONNECTOR_SCOPE=urlhaus
      - CONNECTOR_LOG_LEVEL=info
      - URLHAUS_CSV_URL=https://urlhaus.abuse.ch/downloads/csv_recent/
      - URLHAUS_DEFAULT_X_OPENCTI_SCORE=80
      - URLHAUS_IMPORT_OFFLINE=true
      - URLHAUS_THREATS_FROM_LABELS=true
      - URLHAUS_INTERVAL=3
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    restart: always
    depends_on:
      opencti:
        condition: service_healthy

  connector-cisa-known-exploited-vulnerabilities:
    image: opencti/connector-cisa-known-exploited-vulnerabilities:latest
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=dc788080-859b-49d7-8946-0ec346725204
      - CONNECTOR_NAME=CISA Known Exploited Vulnerabilities
      - CONNECTOR_SCOPE=cisa
      - CONNECTOR_CONFIDENCE_LEVEL=100
      - CONNECTOR_UPDATE_EXISTING_DATA=false
      - CONNECTOR_RUN_AND_TERMINATE=false
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_DURATION_PERIOD=P1D
      - CISA_CATALOG_URL=https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json
      - CISA_CREATE_INFRASTRUCTURES=true
      - CISA_KEV_FLAG_ONLY=false
      - CISA_TLP=TLP:CLEAR
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    restart: always
    depends_on:
      opencti:
        condition: service_healthy

  connector-export-file-stix:
    image: opencti/connector-export-file-stix:latest
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_EXPORT_FILE_STIX_ID}
      - CONNECTOR_TYPE=INTERNAL_EXPORT_FILE
      - CONNECTOR_NAME=ExportFileStix2
      - CONNECTOR_SCOPE=application/json
      - CONNECTOR_LOG_LEVEL=info
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    restart: always
    depends_on:
      opencti:
        condition: service_healthy

  connector-export-file-csv:
    image: opencti/connector-export-file-csv:latest
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_EXPORT_FILE_CSV_ID}
      - CONNECTOR_TYPE=INTERNAL_EXPORT_FILE
      - CONNECTOR_NAME=ExportFileCsv
      - CONNECTOR_SCOPE=text/csv
      - CONNECTOR_LOG_LEVEL=info
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    restart: always
    depends_on:
      opencti:
        condition: service_healthy

  connector-export-file-txt:
    image: opencti/connector-export-file-txt:latest
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_EXPORT_FILE_TXT_ID}
      - CONNECTOR_TYPE=INTERNAL_EXPORT_FILE
      - CONNECTOR_NAME=ExportFileTxt
      - CONNECTOR_SCOPE=text/plain
      - CONNECTOR_LOG_LEVEL=info
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    restart: always
    depends_on:
      opencti:
        condition: service_healthy

  connector-import-file-stix:
    image: opencti/connector-import-file-stix:latest
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_IMPORT_FILE_STIX_ID}
      - CONNECTOR_TYPE=INTERNAL_IMPORT_FILE
      - CONNECTOR_NAME=ImportFileStix
      - CONNECTOR_VALIDATE_BEFORE_IMPORT=true
      - CONNECTOR_SCOPE=application/json,text/xml
      - CONNECTOR_AUTO=true
      - CONNECTOR_LOG_LEVEL=info
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    restart: always
    depends_on:
      opencti:
        condition: service_healthy

  connector-import-document:
    image: opencti/connector-import-document:latest
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_IMPORT_DOCUMENT_ID}
      - CONNECTOR_TYPE=INTERNAL_IMPORT_FILE
      - CONNECTOR_NAME=ImportDocument
      - CONNECTOR_VALIDATE_BEFORE_IMPORT=true
      - CONNECTOR_SCOPE=application/pdf,text/plain,text/html
      - CONNECTOR_AUTO=true
      - CONNECTOR_ONLY_CONTEXTUAL=false
      - CONNECTOR_LOG_LEVEL=info
      - IMPORT_DOCUMENT_CREATE_INDICATOR=true
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    restart: always
    depends_on:
      opencti:
        condition: service_healthy

  connector-import-file-yara:
    image: opencti/connector-import-file-yara:latest
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_IMPORT_FILE_YARA_ID}
      - CONNECTOR_NAME=ImportFileYARA
      - CONNECTOR_VALIDATE_BEFORE_IMPORT=true
      - CONNECTOR_SCOPE=text/yara+plain
      - CONNECTOR_AUTO=false
      - YARA_IMPORT_FILE_SPLIT_RULES=true
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    restart: always
    depends_on:
      opencti:
        condition: service_healthy

  connector-alienvault:
    image: opencti/connector-alienvault:latest
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=4d69790e-5df7-496e-ad0d-c11468f18b7d
      - CONNECTOR_NAME=AlienVault
      - CONNECTOR_SCOPE=alienvault
      - CONNECTOR_LOG_LEVEL=info
      - ALIENVAULT_BASE_URL=https://otx.alienvault.com
      - ALIENVAULT_API_KEY=${ALIENVAULT_API_KEY}
      - ALIENVAULT_TLP=White
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    restart: always
    depends_on:
      opencti:
        condition: service_healthy

  connector-mitre:
    image: opencti/connector-mitre:latest
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=b36d1d3f-aea7-4ce9-a511-206f95879269
      - "CONNECTOR_NAME=MITRE Datasets"
      - CONNECTOR_SCOPE=tool,report,malware,identity,campaign,intrusion-set,attack-pattern,course-of-action,x-mitre-data-source,x-mitre-data-component,x-mitre-matrix,x-mitre-tactic,x-mitre-collection
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    restart: always
    depends_on:
      opencti:
        condition: service_healthy

  connector-threatfox:
    image: opencti/connector-threatfox:latest
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=00445a6c-482a-4363-8a39-9d5451e5e01a
      - CONNECTOR_TYPE=EXTERNAL_IMPORT
      - "CONNECTOR_NAME=Abuse.ch ThreatFox"
      - CONNECTOR_SCOPE=threatfox
      - THREATFOX_CSV_URL=https://threatfox.abuse.ch/export/csv/full/
      - THREATFOX_INTERVAL=30
    extra_hosts:
      - "dockeransible.qitcs.com.au:host-gateway"
    restart: always
    depends_on:
      opencti:
        condition: service_healthy

volumes:
  esdata:
  s3data:
  redisdata:
  amqpdata:
  rsakeys:
  wazuh_cache:
